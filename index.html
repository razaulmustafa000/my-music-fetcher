<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA Music Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F05123;
            --secondary: #FF6A13;
            --bg-color: #0a0a0c;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-color); 
            color: #ffffff; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Glowing Background Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: -1;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: var(--primary);
            top: -100px; left: -100px;
        }
        .blob-2 {
            width: 350px; height: 350px;
            background: var(--secondary);
            bottom: -100px; right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* Hero Section */
        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { 
            font-size: 42px; 
            font-weight: 800; 
            margin: 0 0 10px; 
            background: linear-gradient(90deg, #fff, #ddd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .hero p { color: #a0a0a5; font-size: 16px; font-weight: 300; }

        /* Search Bar (Glass Effect) */
        .search-box {
            display: flex;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 50px;
            padding: 8px 8px 8px 25px;
            max-width: 650px;
            margin: 0 auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .search-box:focus-within {
            border-color: rgba(240, 81, 35, 0.4);
            box-shadow: 0 15px 35px rgba(240, 81, 35, 0.1);
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }
        input::placeholder { color: #666; }
        .search-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(240, 81, 35, 0.3);
        }
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(240, 81, 35, 0.5);
        }

        /* Pill Tags */
        .tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 30px; }
        .tag {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
        }
        .tag:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            border-color: var(--secondary);
        }

        /* Results Grid */
        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        /* Premium Song Card */
        .song-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .song-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }
        .song-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
        }
        .song-card:hover::before { left: 150%; }

        .song-img {
            width: 70px;
            height: 70px;
            border-radius: 14px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .song-info { flex: 1; overflow: hidden; }
        .song-info strong { 
            display: block; 
            font-size: 16px; 
            font-weight: 600;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            margin-bottom: 5px;
            color: #f0f0f0;
        }
        .song-info small { 
            color: #888; 
            font-size: 13px; 
            display: block; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        /* Minimal Download Button */
        .dl-btn {
            background: rgba(240, 81, 35, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(240, 81, 35, 0.3);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .dl-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
            box-shadow: 0 5px 15px rgba(240, 81, 35, 0.3);
        }

        /* Loader */
        .loader {
            width: 45px;
            aspect-ratio: 1;
            --c: no-repeat linear-gradient(var(--primary) 0 0);
            background: var(--c) 0% 50%, var(--c) 50% 50%, var(--c) 100% 50%;
            background-size: 20% 100%;
            animation: l1 1s infinite linear;
            margin: 60px auto;
            display: none;
        }
        @keyframes l1 {
            0%  {background-size: 20% 100%,20% 100%,20% 100%}
            33% {background-size: 20% 10%,20% 100%,20% 100%}
            66% {background-size: 20% 100%,20% 10%,20% 100%}
            100%{background-size: 20% 100%,20% 100%,20% 10%}
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .hero h1 { font-size: 32px; }
            .search-box { flex-direction: column; padding: 5px; border-radius: 25px; background: transparent; border: none; box-shadow: none;}
            input { padding: 15px 25px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px; margin-bottom: 10px; width: 100%; box-sizing: border-box;}
            .search-btn { width: 100%; padding: 15px; border-radius: 30px; }
            #results { grid-template-columns: 1fr; }
            .song-card { padding: 12px; border-radius: 16px; }
            .song-img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

    <!-- Background Effects -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <!-- Header -->
        <div class="hero">
            <h1>RA AudioHQ</h1>
            <p>Experience studio-quality downloads instantly.</p>
        </div>

        <!-- Search Area -->
        <div class="search-box">
            <input type="text" id="query" placeholder="Search for tracks, artists, or albums...">
            <button class="search-btn" onclick="searchAudio()">Discover</button>
        </div>

        <!-- Trending Tags -->
        <div class="tags">
            <div class="tag" onclick="quickSearch('Saraiki Hit Songs')">🌾 Saraiki</div>
            <div class="tag" onclick="quickSearch('Punjabi Hit Songs')">🥁 Punjabi</div>
            <div class="tag" onclick="quickSearch('Urdu Songs')">📜 Urdu</div>
            <div class="tag" onclick="quickSearch('Hindi Hits')">🪷 Hindi</div>
            <div class="tag" onclick="quickSearch('Bollywood Mashup')">🔀 Mashup</div>
            <div class="tag" onclick="quickSearch('Coke Studio')">🎙️ Coke Studio</div>
            <div class="tag" onclick="quickSearch('Party Songs')">🎉 Party</div>
            <div class="tag" onclick="quickSearch('Sad Songs')">💔 Sad</div>
            <div class="tag" onclick="quickSearch('Love Songs')">❤️ Love</div>
        </div>

        <!-- Loading Animation -->
        <div id="loader" class="loader"></div>

        <!-- Results -->
        <div id="results"></div>
    </div>

<script>
    function quickSearch(term) {
        document.getElementById('query').value = term;
        searchAudio();
    }

    async function searchAudio() {
        const query = document.getElementById('query').value;
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');

        if(!query) return;

        resultsDiv.innerHTML = '';
        loader.style.display = 'block';

        try {
            const response = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            loader.style.display = 'none';

            if (!data.data || !data.data.results || data.data.results.length === 0) {
                resultsDiv.innerHTML = '<p style="text-align:center; color:#888; width:100%; margin-top:30px;">No tracks found. Try a different keyword.</p>';
                return;
            }

            data.data.results.forEach(song => {
                const downloadLink = song.downloadUrl.find(link => link.quality === '320kbps')?.url || song.downloadUrl[0].url;
                
                let imageUrl = 'https://via.placeholder.com/70/333/fff?text=Audio'; 
                if (song.image && song.image.length > 0) {
                    imageUrl = song.image[song.image.length - 1].url || song.image[song.image.length - 1].link || imageUrl;
                }
                
                const tempDiv = document.createElement("div");
                tempDiv.innerHTML = song.name;
                const cleanTitle = tempDiv.textContent || tempDiv.innerText;
                const artistName = song.artists.primary[0]?.name || 'Unknown Artist';

                resultsDiv.innerHTML += `
                    <div class="song-card">
                        <img src="${imageUrl}" alt="Cover" class="song-img" loading="lazy">
                        <div class="song-info">
                            <strong>${cleanTitle}</strong>
                            <small>${artistName} • ${song.year || '2024'}</small>
                        </div>
                        <button onclick="downloadFile('${downloadLink}', '${cleanTitle.replace(/'/g, "\\'")}')" class="dl-btn">Get Audio</button>
                    </div>
                `;
            });
        } catch (error) {
            loader.style.display = 'none';
            resultsDiv.innerHTML = '<p style="text-align:center; color:#ff4d4d; width:100%;">Connection Error. Please try again.</p>';
        }
    }

    async function downloadFile(url, title) {
        const notify = document.createElement('div');
        notify.innerText = 'Initializing Download...';
        notify.style.cssText = 'position:fixed; bottom:20px; right:20px; background:linear-gradient(135deg, #F05123, #FF6A13); color:white; padding:15px 25px; border-radius:10px; box-shadow:0 10px 20px rgba(240,81,35,0.3); z-index:1000; font-size:14px; font-weight:600; animation: slideIn 0.3s ease-out;';
        document.body.appendChild(notify);

        setTimeout(() => notify.remove(), 3000);

        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = downloadUrl;
            a.download = `${title}.m4a`; 
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(downloadUrl);
        } catch (error) {
            alert("Error downloading file. Please try again.");
        }
    }

    document.getElementById("query").addEventListener("keypress", function(event) {
        if (event.key === "Enter") searchAudio();
    });

    // Add keyframes for notification
    const style = document.createElement('style');
    style.innerHTML = `@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }`;
    document.head.appendChild(style);
</script>

</body>
</html>
